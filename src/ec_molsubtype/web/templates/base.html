<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}ec-molsubtype{% endblock %}</title>
  <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=DM+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/molpath.css">
  <link rel="stylesheet" href="/static/style.css">
  <script src="https://unpkg.com/htmx.org@2.0.4" integrity="sha384-HGfztofotfshcF7+8n44JQL2oJmowVChPTg48S+jvZoztPfvwD79OC/LTtG6dMp+" crossorigin="anonymous"></script>
</head>
<body>
  <div class="mp-background-glow"></div>

  <header class="site-header">
    <div class="mp-layout">
      <nav class="mp-flex mp-between">
        <a href="/" class="brand">
          <span class="brand-mark">EC</span>
          <span class="brand-name">molsubtype</span>
        </a>
        <div class="mp-flex nav-links">
          <a href="/">Classify</a>
          <a href="/methods">Methods</a>
          <a href="/cli">CLI</a>
        </div>
      </nav>
    </div>
  </header>

  <main class="mp-layout mp-animate-in">
    {% block content %}{% endblock %}
  </main>

  <footer class="site-footer">
    <div class="mp-layout">
      <p class="mp-soft" style="font-size: var(--mp-fs-xs); line-height: 1.6;">
        ec-molsubtype v{{ version }}.
        Research and clinical decision support only. Final classification must be confirmed by a molecular pathologist.<br>
        Based on WHO 2020 classification and Swedish national guidelines v3.2.
        <a href="https://github.com/viktorlj/ec-molsubtype" style="color: var(--mp-accent);">GitHub</a>
      </p>
    </div>
  </footer>
</body>
</html>
