{% extends "base.html" %}
{% block title %}Error — ec-molsubtype{% endblock %}
{% block content %}
<div class="mp-panel">
  <p class="mp-eyebrow" style="color: var(--mp-danger);">Classification error</p>
  <div class="mp-error-box">{{ error }}</div>
  <p class="mp-soft" style="margin-top: var(--mp-space-md); font-size: var(--mp-fs-sm);">Check that your file is a valid tab-separated MAF with at least:
    <code class="mp-mono">Hugo_Symbol</code>, <code class="mp-mono">Variant_Classification</code>, <code class="mp-mono">HGVSp_Short</code>.</p>
  <a href="/" class="mp-btn-secondary" style="display: inline-block; margin-top: var(--mp-space-md); text-decoration: none; padding: 9px 16px; border-radius: var(--mp-radius-sm);">Try again</a>
</div>
{% endblock %}
